
[functions.send-verification-email]
enabled = true
verify_jwt = false
import_map = "./functions/send-verification-email/deno.json"
entrypoint = "./functions/send-verification-email/index.ts"

[functions.create-verified-user]
enabled = true
verify_jwt = false
entrypoint = "./functions/create-verified-user/index.ts"

[functions.check-in]
enabled = true
verify_jwt = false
import_map = "./functions/check-in/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/check-in/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/check-in/*.html" ]

[functions.check-out]
enabled = true
verify_jwt = false
import_map = "./functions/check-out/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/check-out/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/check-out/*.html" ]
